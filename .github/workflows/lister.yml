name: "Sync Apps List"

on:
  push:
    branches: main
    paths:
      - programs/x86_64-apps
      - programs/i686-apps
      - programs/aarch64-apps

  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync-files:
    name: "Run sync"
    runs-on: ubuntu-22.04
    steps:
      - name: "Checkout source repository"
        uses: actions/checkout@v4

      - name: "Run lister"
        run: |
          cd programs
          ./appimage-lister-uniq.sh

      - name: "Push to Source"
        run: |
          git config --global user.name "ivan-hc"
          git config --global user.email "noreply@github.com"
          git add programs/x86_64-appimages programs/i686-appimages programs/aarch64-appimages
          if git diff-index --quiet HEAD; then
            echo "No changes to commit." >> $GITHUB_STEP_SUMMARY
          else
            HASH_LIST=$(git log -100 --branches main --grep "Sync files from source repository" --grep "noreply@github.com" --pretty=%H)
            git reset --soft $(git merge-base origin/main HEAD)
            for HASH in $HASH_LIST; do
              git cherry-pick --no-commit $HASH || (git cherry-pick --abort && exit 1)
            done
            git commit -m "Sync files from source repository"
            git push --force-with-lease && echo "sync successfull" >> $GITHUB_STEP_SUMMARY
          fi
